app = "wiki-generator-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Build context is the monorepo root (needs package.json + bun.lock)
  [build.args]

[deploy]
  release_command = "node dist/src/migration-runner.js"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # SSE: increase response timeout for long-running wiki generation streams
  [http_service.http_options]
    response_header_timeout = 600

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
